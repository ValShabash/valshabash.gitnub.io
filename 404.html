<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Шабаш Валькирии</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #0a0a0a;
      background-image: radial-gradient(circle at 10% 20%, #2a0a0a 1px, transparent 1px);
      background-size: 25px 25px;
      color: #e6e6e6;
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid #2e2e2e;
    }
    h1 {
      font-size: 6rem;
      color: #8b0000;
      text-shadow: 2px 2px 0 #4a0000;
      margin-bottom: 20px;
      font-family: 'Palatino', 'Georgia', serif;
    }
    p {
      margin-bottom: 20px;
      font-size: 1.2rem;
    }
    a {
      color: #c9a87b;
      text-decoration: none;
      background: #2a1e12;
      padding: 8px 20px;
      border-radius: 30px;
      display: inline-block;
      transition: 0.2s;
    }
    a:hover {
      background: #8b0000;
      color: white;
    }
    @media (max-width: 768px) {
      h1 { font-size: 4rem; }
      p { font-size: 1rem; }
      .container { padding: 30px 20px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <p>Страница не найдена. Похоже, её замело снегом или украли чиновники.</p>
  <p><a href="index.html">Вернуться на главную</a></p>
</div>
</body>
</html>
